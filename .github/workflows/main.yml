name: Docker CI

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t nouralhodaadeeb/docker-react -f Dockerfile.dev .

      - name: Run tests
        run: docker run nouralhodaadeeb/docker-react npm run test -- --coverage
